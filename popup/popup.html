<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="color-scheme" content="dark" />
    <title>Verbatim Interlinear</title>
    <link rel="stylesheet" href="../shared/theme.css" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="vit-ui vit-popup">
    <div class="shell">
      <div class="brand">
        <img src="../logo.png" alt="" class="brand-mark" width="46" height="46" />
        <div class="brand-text">
          <h1>Verbatim Interlinear</h1>
          <p>Word-by-word gloss on the page</p>
        </div>
      </div>

      <div class="card">
        <div
          class="row row--toggle"
          title="Interlinear on: glosses on this tab; not necessarily cache-only."
        >
          <div class="row-label">
            <strong>Interlinear mode</strong>
            <span id="toggleSub">Off</span>
          </div>
          <div class="toggle-wrap">
            <span id="toggleLoading" class="toggle-loading" role="status" aria-live="polite" hidden>
              <span class="toggle-loading-spinner" aria-hidden="true"></span>
              <span class="visually-hidden">Translating page</span>
            </span>
            <label class="switch" title="Toggle interlinear translation for this tab">
              <input type="checkbox" id="pageToggle" />
              <span class="slider"></span>
            </label>
          </div>
        </div>

        <div class="lang-fields" role="group" aria-label="Translation languages">
          <label class="lang-field">
            <span class="lang-field-label">Source language</span>
            <div class="custom-select">
              <button
                type="button"
                class="custom-select-trigger"
                id="sourceLangFace"
                aria-haspopup="listbox"
                aria-expanded="false"
                aria-controls="sourceLangListbox"
                disabled
              >
                <span class="custom-select-value">—</span>
                <span class="custom-select-chevron" aria-hidden="true"></span>
              </button>
              <div class="custom-select-dropdown" id="sourceLangDropdown" hidden>
                <ul
                  class="custom-select-options"
                  id="sourceLangListbox"
                  role="listbox"
                  aria-labelledby="sourceLangFace"
                ></ul>
              </div>
              <select
                id="sourceLang"
                class="lang-select-native"
                title="Language of the page text"
                tabindex="-1"
                aria-hidden="true"
                disabled
              ></select>
            </div>
          </label>
          <label class="lang-field">
            <span class="lang-field-label">Target language</span>
            <div class="custom-select">
              <button
                type="button"
                class="custom-select-trigger"
                id="targetLangFace"
                aria-haspopup="listbox"
                aria-expanded="false"
                aria-controls="targetLangListbox"
                disabled
              >
                <span class="custom-select-value">—</span>
                <span class="custom-select-chevron" aria-hidden="true"></span>
              </button>
              <div class="custom-select-dropdown" id="targetLangDropdown" hidden>
                <ul
                  class="custom-select-options"
                  id="targetLangListbox"
                  role="listbox"
                  aria-labelledby="targetLangFace"
                ></ul>
              </div>
              <select
                id="targetLang"
                class="lang-select-native"
                title="Language to translate into"
                tabindex="-1"
                aria-hidden="true"
                disabled
              ></select>
            </div>
          </label>
        </div>

        <div class="row row--swap" role="group" aria-label="Swap languages">
          <div class="swap-lang-pair">
            <button
              type="button"
              class="btn-swap"
              id="swapLang"
              aria-label="Swap source and target languages"
              title="Swap languages"
              disabled
            >
              <span aria-hidden="true">⇄</span>
            </button>
            <span class="swap-lang-caption">Switch languages</span>
          </div>
        </div>

        <label class="lang-field lang-field--full">
          <span class="lang-field-label">LibreTranslate URL</span>
          <input
            type="url"
            id="libreTranslateBaseUrl"
            class="lang-input"
            placeholder="https://libretranslate.com"
            autocomplete="off"
            spellcheck="false"
          />
        </label>

        <p id="languagesError" class="popup-error popup-error--inline" role="alert" hidden></p>

        <div class="row row--cache" role="group" aria-label="Translation cache">
          <label class="row-cache-label">
            <input type="checkbox" id="useTranslationCache" checked />
            <span>Use cache</span>
          </label>
          <button type="button" class="btn-clear-cache" id="clearTranslationCache">
            Clear cache
          </button>
        </div>
        <p id="legacyCacheHint" class="cache-legacy-hint" role="note" hidden></p>
        <p id="cacheStatus" class="cache-status" role="status" aria-live="polite" hidden></p>

        <p id="statusLine" class="status-line" role="status" aria-live="polite" hidden></p>

        <p id="idleHint" class="idle-hint" role="region" aria-label="Last run summary" hidden></p>

        <p id="popupError" class="popup-error" role="alert" hidden></p>

        <p class="hint-kbd">Shortcut: <kbd>Ctrl</kbd>/<kbd>⌘</kbd>+<kbd>Shift</kbd>+<kbd>Y</kbd></p>
      </div>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
