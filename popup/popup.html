<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Verbatim Interlinear</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="shell">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div class="brand-text">
          <h1>Verbatim Interlinear</h1>
          <p>Word-by-word gloss on the page</p>
        </div>
      </div>

      <div class="card">
        <div class="row">
          <div class="row-label">
            <strong>Interlinear mode</strong>
            <span id="toggleSub">Off</span>
          </div>
          <label class="switch" title="Toggle interlinear translation for this tab">
            <input type="checkbox" id="pageToggle" />
            <span class="slider"></span>
          </label>
        </div>

        <div class="footer">
          <a class="link-options" id="openOptions" href="#">Options &amp; API keys</a>
        </div>
        <p class="hint-kbd">Shortcut: <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>Y</kbd> · Mac: <kbd>⌘</kbd>+<kbd>Shift</kbd>+<kbd>Y</kbd></p>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
