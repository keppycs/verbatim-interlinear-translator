<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Verbatim Interlinear</title>
    <link rel="stylesheet" href="../shared/theme.css" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="vit-ui vit-popup">
    <div class="shell">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div class="brand-text">
          <h1>Verbatim Interlinear</h1>
          <p>Word-by-word gloss on the page</p>
        </div>
      </div>

      <div class="card">
        <div class="lang-fields" role="group" aria-label="Translation languages">
          <label class="lang-field">
            <span class="lang-field-label">Source language</span>
            <select id="sourceLang" class="lang-select" title="Language of the page text"></select>
          </label>
          <label class="lang-field">
            <span class="lang-field-label">Target language</span>
            <select id="targetLang" class="lang-select" title="Language to translate into"></select>
          </label>
        </div>

        <div
          class="row row--toggle"
          title="Interlinear on: this tab shows word glosses. That does not mean everything came from cache — see the note below."
        >
          <div class="row-label">
            <strong>Interlinear mode</strong>
            <span id="toggleSub">Off</span>
          </div>
          <div class="toggle-wrap">
            <span id="toggleLoading" class="toggle-loading" role="status" aria-live="polite" hidden>
              <span class="toggle-loading-spinner" aria-hidden="true"></span>
              <span class="visually-hidden">Translating page</span>
            </span>
            <label class="switch" title="Toggle interlinear translation for this tab">
              <input type="checkbox" id="pageToggle" />
              <span class="slider"></span>
            </label>
          </div>
        </div>

        <p id="statusLine" class="status-line" role="status" aria-live="polite" hidden></p>

        <p id="idleHint" class="idle-hint" role="region" aria-label="How interlinear loading works" hidden></p>

        <p id="popupError" class="popup-error" role="alert" hidden></p>

        <div class="footer">
          <a class="link-options" id="openOptions" href="#">Options &amp; API keys</a>
        </div>
        <p class="hint-kbd">Shortcut: <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>Y</kbd> · Mac: <kbd>⌘</kbd>+<kbd>Shift</kbd>+<kbd>Y</kbd></p>
      </div>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
