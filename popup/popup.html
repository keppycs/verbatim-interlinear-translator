<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="color-scheme" content="dark" />
    <title>Verbatim Interlinear Translator</title>
    <link rel="stylesheet" href="../shared/theme.css" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="vit-ui vit-popup">
    <div class="shell">
      <div class="brand">
        <img src="../logo.png" alt="" class="brand-mark" width="48" height="48" />
        <div class="brand-text">
          <h1>Verbatim Interlinear Translator</h1>
          <p>Word-by-word gloss on the page</p>
        </div>
      </div>

      <div class="card">
        <div class="lang-fields" role="group" aria-label="Translation languages">
          <label class="lang-field">
            <span class="lang-field-label">Source language</span>
            <div class="custom-select">
              <button
                type="button"
                class="custom-select-trigger"
                id="sourceLangFace"
                aria-haspopup="listbox"
                aria-expanded="false"
                aria-controls="sourceLangListbox"
                disabled
              >
                <span class="custom-select-value">—</span>
                <span class="custom-select-chevron" aria-hidden="true"></span>
              </button>
              <div class="custom-select-dropdown" id="sourceLangDropdown" hidden>
                <ul
                  class="custom-select-options"
                  id="sourceLangListbox"
                  role="listbox"
                  aria-labelledby="sourceLangFace"
                ></ul>
              </div>
              <select
                id="sourceLang"
                class="lang-select-native"
                title="Language of the page text"
                tabindex="-1"
                aria-hidden="true"
                disabled
              ></select>
            </div>
          </label>
          <label class="lang-field">
            <span class="lang-field-label">Target language</span>
            <div class="custom-select">
              <button
                type="button"
                class="custom-select-trigger"
                id="targetLangFace"
                aria-haspopup="listbox"
                aria-expanded="false"
                aria-controls="targetLangListbox"
                disabled
              >
                <span class="custom-select-value">—</span>
                <span class="custom-select-chevron" aria-hidden="true"></span>
              </button>
              <div class="custom-select-dropdown" id="targetLangDropdown" hidden>
                <ul
                  class="custom-select-options"
                  id="targetLangListbox"
                  role="listbox"
                  aria-labelledby="targetLangFace"
                ></ul>
              </div>
              <select
                id="targetLang"
                class="lang-select-native"
                title="Language to translate into"
                tabindex="-1"
                aria-hidden="true"
                disabled
              ></select>
            </div>
          </label>
        </div>

        <div class="row row--swap" role="group" aria-label="Swap languages">
          <button
            type="button"
            class="btn-swap"
            id="swapLang"
            aria-label="Swap source and target languages"
            title="Swap source and target languages"
            disabled
          >
            <span class="btn-swap-icon" aria-hidden="true">⇄</span>
            <span>Switch languages</span>
          </button>
        </div>

        <div
          class="toggle-panel"
          title="Interlinear on: glosses on this tab; not necessarily cache-only."
        >
          <div class="row row--toggle-line">
            <strong class="toggle-line-title">Enable translator</strong>
            <div class="toggle-wrap">
              <span
                id="toggleLoading"
                class="toggle-loading"
                role="status"
                aria-live="polite"
                hidden
              >
                <span class="toggle-loading-spinner" aria-hidden="true"></span>
                <span class="visually-hidden">Translating page</span>
              </span>
              <label class="switch" title="Toggle interlinear translation for this tab">
                <input type="checkbox" id="pageToggle" />
                <span class="slider"></span>
              </label>
            </div>
          </div>
          <div class="row row--toggle-line">
            <span class="toggle-line-title">Enable on all tabs</span>
            <label
              class="switch"
              title="When on, interlinear applies to every tab. When off, only this tab."
            >
              <input type="checkbox" id="syncPageTranslationAcrossTabs" />
              <span class="slider"></span>
            </label>
          </div>
          <div class="row row--toggle-line" role="group" aria-label="Translation cache">
            <span class="toggle-line-title">Use cache</span>
            <label class="switch" title="Remember glosses locally between visits (when supported).">
              <input type="checkbox" id="useTranslationCache" checked />
              <span class="slider"></span>
            </label>
          </div>
          <p class="toggle-panel-status" id="toggleSub">Translation off</p>
        </div>

        <label class="lang-field lang-field--full">
          <span class="lang-field-label">LibreTranslate URL</span>
          <input
            type="url"
            id="libreTranslateBaseUrl"
            class="lang-input"
            placeholder="https://libretranslate.com"
            autocomplete="off"
            spellcheck="false"
          />
        </label>

        <p id="legacyCacheHint" class="cache-legacy-hint" role="note" hidden></p>

        <div class="row row--kbd-cache" role="group" aria-label="Keyboard shortcut and cache">
          <p class="hint-kbd">
            Shortcut: <kbd>Ctrl</kbd>/<kbd>⌘</kbd>+<kbd>Shift</kbd>+<kbd>Y</kbd>
          </p>
          <button type="button" class="btn-clear-cache" id="clearTranslationCache">
            Clear cache
          </button>
        </div>
      </div>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
